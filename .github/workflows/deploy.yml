# RRR Clinic API — CI/CD Pipeline
# Trigger: push to main → test → build Docker → push GHCR → deploy Azure Container Apps
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GROQ_API_KEY          — Groq API key
#   GITHUB_TOKEN          — auto-provided by GitHub Actions
#   AZURE_CREDENTIALS     — output of: az ad sp create-for-rbac --sdk-auth
#   AZURE_RESOURCE_GROUP  — e.g. rrr-clinic-rg
#   AZURE_CONTAINER_APP   — e.g. rrr-clinic-api
#   AZURE_CONTAINER_ENV   — e.g. rrr-clinic-env

name: Deploy RRR Clinic API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet — skipping"

      - name: Syntax check all Python files
        run: |
          find backend -name "*.py" | xargs python -m py_compile && echo "All Python files OK"

  # ── Job 2: Build & Push Docker image ─────────────────────────────────────────
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Azure Container Apps ────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://${{ secrets.AZURE_CONTAINER_APP }}.azurecontainerapps.io

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          environmentVariables: |
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
            WANDB_API_KEY=${{ secrets.WANDB_API_KEY }}
            PORT=8000

      - name: Health check after deploy
        run: |
          sleep 30
          curl -f https://${{ secrets.AZURE_CONTAINER_APP }}.azurecontainerapps.io/health \
            && echo "Deployment healthy!" \
            || echo "Health check failed — check Azure portal"
